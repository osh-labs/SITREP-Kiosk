# =============================================================================
# getty-autologin.conf — console auto-login for the kiosk user on tty1.
#
# Installed by deploy/install.sh to:
#   /etc/systemd/system/getty@tty1.service.d/override.conf
#
# Auto-logs the kiosk user into a console on tty1; the user's ~/.bash_profile
# then runs `startx`, which launches the X/Openbox kiosk session (~/.xinitrc).
#
# PLACEHOLDER __KIOSK_USER__ is substituted by install.sh (e.g. kiosk).
# =============================================================================
[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin __KIOSK_USER__ --noclear %I $TERM
