<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Field SITREP Board — United Consulting situational awareness kiosk">
  <title>Field SITREP Board</title>
  <!-- Vendored MapLibre GL (no CDN at boot) -->
  <link rel="stylesheet" href="vendor/maplibre-gl/maplibre-gl.css">
  <!-- Vendored Phosphor icon font (no CDN at boot) -->
  <link rel="stylesheet" href="vendor/phosphor/phosphor.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Loading screen shown until first data arrives -->
  <div id="loading-screen" role="status" aria-live="polite">
    <div class="loading-spinner" aria-hidden="true"></div>
    <div class="loading-text">Loading SITREP&hellip;</div>
  </div>

  <!-- Fatal-error screen (shown only on first-load failure with no cached state) -->
  <div id="error-screen" role="alert" aria-live="assertive">
    <i class="ph-fill ph-warning-octagon error-icon" aria-hidden="true"></i>
    <div class="error-title">Unable to load board data</div>
    <div class="error-detail" id="error-detail">Check network connection and backend service.</div>
  </div>

  <!-- Main kiosk shell -->
  <div id="app" aria-label="Field SITREP Board">

    <!-- Persistent header: UC logo + title (left) · context + clock (center) · risk + ZeroHarm (right) -->
    <header id="global-header" aria-label="Board header">
      <div class="header-zone header-left">
        <img class="brand-logo" id="brand-uc" src="assets/uc-logo-white.png" alt="United Consulting">
        <span class="board-title">Field SITREP</span>
      </div>
      <div class="header-zone header-center">
        <div class="header-context">
          <span id="header-location" aria-label="Location"></span>
          <span id="header-mode-badge" aria-label="Display mode"></span>
        </div>
        <div id="header-datetime" aria-label="Current date and time" aria-live="off"></div>
      </div>
      <div class="header-zone header-right">
        <div class="risk-block">
          <span class="risk-label">Overall Risk</span>
          <span id="overall-risk" aria-label="Overall risk level"></span>
          <span id="next-update" aria-label="Next update"></span>
        </div>
        <img class="brand-logo" id="brand-zeroharm" src="assets/zeroharm-logo-white.png" alt="ZeroHarm safety program">
      </div>
    </header>

    <!-- Reconnecting / stale-fetch indicator -->
    <div id="status-bar" role="status" aria-live="polite">
      <i class="ph ph-arrows-clockwise status-spin" aria-hidden="true"></i>
      <span id="status-text">Reconnecting&hellip;</span>
    </div>

    <!-- Dashboard grid -->
    <main id="dashboard" aria-label="Situational dashboard">

      <!-- Left column -->
      <section class="dash-col dash-col-left" aria-label="Hazards and briefing">
        <div class="card" id="card-hazards" aria-label="Hazards"></div>
        <div class="card" id="card-summary" aria-label="Briefing summary"></div>
      </section>

      <!-- Center: interactive weather map -->
      <section class="dash-col dash-col-center" aria-label="Weather map">
        <div class="card card-map-wrap" id="card-map">
          <div id="map" role="img" aria-label="Interactive weather radar and alerts map"></div>
          <div id="map-degraded" class="map-degraded hidden" role="alert" aria-live="polite"></div>
        </div>
      </section>

      <!-- Right column -->
      <section class="dash-col dash-col-right" aria-label="Forecast and disruptions">
        <div class="card" id="card-chart-temp" aria-label="Temperature and heat index trend"></div>
        <div class="card" id="card-activity" aria-label="Disruptions or commute"></div>
        <div class="card" id="card-forecast" aria-label="3-day look ahead"></div>
        <div class="card" id="card-safety" aria-label="Safety tip"></div>
      </section>

    </main>

    <!-- Bottom status strip -->
    <footer id="status-strip" aria-label="Conditions summary strip"></footer>

  </div>

  <script src="vendor/maplibre-gl/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
