# Field SITREP Board — example configuration
# Copy to config.yaml and adjust. All hazard triggers live here, not in code.

location:
  name: "Atlanta Metro"
  lat: 33.7490
  lon: -84.3880

# Open-Meteo + map settings. Open-Meteo is keyless; it supplies the hourly
# series, charts, and the sunrise/sunset/UV/visibility status-strip items.
# NWS stays authoritative for current conditions and alerts.
weather:
  timezone: "America/New_York"   # IANA tz for Open-Meteo (keeps arrays local)

display:
  dwell_seconds: 12              # legacy carousel dwell; ignored by the single dashboard
  mode_windows:
    morning_until: "12:00"   # local time; afternoon mode thereafter
  work_hours:                # used for "during work hours" trigger checks
    start: "06:00"
    end: "18:00"

# Customizable interactive weather map (Leaflet). Tiles load in the browser;
# the authoritative alert polygons come from /api/alerts.geojson (loopback).
weather_map:
  enabled: true
  center: { lat: 33.7490, lon: -84.3880 }   # defaults to location if omitted
  default_zoom: 7                 # 7 spans Paducah KY → St. Augustine FL on the 4K kiosk
  min_zoom: 5
  max_zoom: 10
  base_style: voyager             # voyager | dark | dark_nolabels | light | osm
  layers:
    radar:  { default_on: true, opacity: 0.7 }
    alerts: { default_on: true }
    temps:  { default_on: true, opacity: 0.85 }
  animation:
    enabled: true
    frames: 8                     # number of 5-min IEM radar steps in the loop
    interval_ms: 600              # dwell per frame
    refresh_seconds: 300          # rebuild the frame set (match IEM's ~5-min cadence)
  rotation:                       # auto-cycle the map between views
    enabled: true
    interval_seconds: 20          # how long each view shows
    modes: [radar, alerts, temps] # order of the rotation
  alerts:                         # alert-polygon overlay coverage
    area: [GA, TN, AL, FL, SC, NC, KY]   # NWS /alerts/active?area=... (states in view)
  temps:                          # cities shown on the temperature view
    # Leave empty to use the built-in set (Paducah KY → St. Augustine FL), or
    # list { name, lat, lon } entries to override. One keyless Open-Meteo call.
    cities:
      - { name: Paducah,       lat: 37.083, lon: -88.600 }
      - { name: Memphis,       lat: 35.146, lon: -90.049 }
      - { name: Nashville,     lat: 36.163, lon: -86.781 }
      - { name: Knoxville,     lat: 35.961, lon: -83.921 }
      - { name: Chattanooga,   lat: 35.046, lon: -85.310 }
      - { name: Huntsville,    lat: 34.730, lon: -86.586 }
      - { name: Birmingham,    lat: 33.521, lon: -86.809 }
      - { name: Tuscaloosa,    lat: 33.210, lon: -87.569 }
      - { name: Montgomery,    lat: 32.367, lon: -86.300 }
      - { name: Mobile,        lat: 30.694, lon: -88.043 }
      - { name: Dothan,        lat: 31.223, lon: -85.390 }
      - { name: Asheville,     lat: 35.595, lon: -82.551 }
      - { name: Charlotte,     lat: 35.227, lon: -80.843 }
      - { name: Greenville,    lat: 34.853, lon: -82.394 }
      - { name: Columbia,      lat: 34.001, lon: -81.035 }
      - { name: Charleston,    lat: 32.776, lon: -79.931 }
      - { name: Atlanta,       lat: 33.749, lon: -84.388 }
      - { name: Athens,        lat: 33.961, lon: -83.378 }
      - { name: Augusta,       lat: 33.471, lon: -81.975 }
      - { name: Macon,         lat: 32.841, lon: -83.632 }
      - { name: Columbus,      lat: 32.461, lon: -84.988 }
      - { name: Albany,        lat: 31.578, lon: -84.156 }
      - { name: Savannah,      lat: 32.081, lon: -81.091 }
      - { name: Brunswick,     lat: 31.150, lon: -81.491 }
      - { name: Valdosta,      lat: 30.833, lon: -83.278 }
      - { name: Tallahassee,   lat: 30.438, lon: -84.281 }
      - { name: Pensacola,     lat: 30.421, lon: -87.217 }
      - { name: Panama City,   lat: 30.166, lon: -85.660 }
