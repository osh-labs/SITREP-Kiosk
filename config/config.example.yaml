# Field SITREP Board — example configuration
# Copy to config.yaml and adjust. All hazard triggers live here, not in code.

location:
  name: "Atlanta Metro"
  lat: 33.7490
  lon: -84.3880

# Open-Meteo + map settings. Open-Meteo is keyless; it supplies the hourly
# series, charts, and the sunrise/sunset/UV/visibility status-strip items.
# NWS stays authoritative for current conditions and alerts.
weather:
  timezone: "America/New_York"   # IANA tz for Open-Meteo (keeps arrays local)

display:
  dwell_seconds: 12              # legacy carousel dwell; ignored by the single dashboard
  mode_windows:
    morning_until: "12:00"   # local time; afternoon mode thereafter
  work_hours:                # used for "during work hours" trigger checks
    start: "06:00"
    end: "18:00"

# Customizable interactive weather map (Leaflet). Tiles load in the browser;
# the authoritative alert polygons come from /api/alerts.geojson (loopback).
weather_map:
  enabled: true
  center: { lat: 33.7490, lon: -84.3880 }   # defaults to location if omitted
  default_zoom: 8
  min_zoom: 6
  max_zoom: 10
  base_style: voyager             # voyager | dark | dark_nolabels | light | osm
  layers:
    radar:  { default_on: true, opacity: 0.7 }
    alerts: { default_on: true }
  animation:
    enabled: true
    frames: 8                     # number of 5-min IEM radar steps in the loop
    interval_ms: 600              # dwell per frame
    refresh_seconds: 300          # rebuild the frame set (match IEM's ~5-min cadence)

polling_seconds:
  nws: 900        # 10-15 min
  spc: 1800
  airnow: 1800    # hourly NowCast; stay well under 500 req/hr/service
  ga511: 90       # within 10 calls / 60 s
  openmeteo: 900  # keyless; generous free tier — 15 min matches NWS cadence
  briefing: 1800  # BLUF regenerates on material data change, not on a timer.
                  # This value is only the retry cadence for recovering a
                  # template fallback to a model briefing when the model was
                  # unavailable; steady state makes no calls until data shifts.

staleness_seconds:
  default: 3600   # beyond this, mark a source stale and show the degraded state

# Hazard trigger values. See PRD Section 12 for the confidence tier of each.
# firm = published standard | verify = confirm against WFO FFC | default = set to taste
hazard_thresholds:
  heat_index_f:            # firm (NWS heat-index work bands)
    extreme_caution: 90    # callout appears at/above this during work hours
    danger: 103
    extreme_danger: 125
  thunderstorm_probability_pct: 30   # default
  rain:                              # default
    pop_pct: 50
    qpf_in: 0.25
  wind_gust_mph_flag: 30             # default; equipment manuals govern go/no-go
  aqi_callout: 101                   # firm (Code Orange / Unhealthy for Sensitive Groups)
  winter:                            # triggers firm; values verify against FFC
    temp_f_with_precip: 32

# D5 ranking, highest first. AQI is handled as a separate callout, not ranked here.
ranking_order:
  - severe_weather
  - heat_index
  - winter_weather
  - thunderstorms
  - rain
  - wind
