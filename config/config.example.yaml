polling_seconds:
  nws: 900        # 10-15 min
  spc: 1800
  airnow: 1800    # hourly NowCast; stay well under 500 req/hr/service
  ga511: 90       # within 10 calls / 60 s
  openmeteo: 900  # keyless; generous free tier — 15 min matches NWS cadence
  temps: 900      # keyless Open-Meteo grid for the map temperature view
  briefing: 1800  # BLUF regenerates on material data change, not on a timer.
                  # This value is only the retry cadence for recovering a
                  # template fallback to a model briefing when the model was
                  # unavailable; steady state makes no calls until data shifts.

staleness_seconds:
  default: 3600   # beyond this, mark a source stale and show the degraded state

# Hazard trigger values. See PRD Section 12 for the confidence tier of each.
# firm = published standard | verify = confirm against WFO FFC | default = set to taste
hazard_thresholds:
  heat_index_f:            # firm (NWS heat-index work bands)
    extreme_caution: 90    # callout appears at/above this during work hours
    danger: 103
    extreme_danger: 125
  thunderstorm_probability_pct: 30   # default
  rain:                              # default
    pop_pct: 50
    qpf_in: 0.25
  wind_gust_mph_flag: 30             # default; equipment manuals govern go/no-go
  aqi_callout: 101                   # firm (Code Orange / Unhealthy for Sensitive Groups)
  winter:                            # triggers firm; values verify against FFC
    temp_f_with_precip: 32

# 511GA traffic prioritization. Events are ranked deterministically (in code,
# not by the model) so the board leads with the worst disruptions and lets
# minor problems slide out of view. Ranked hierarchy, most to least important:
#   1. Interstate closure   2. Interstate major accident
#   3. State-road closure   4. State-road major accident   5. everything else
traffic:
  max_events: 6                  # show at most this many; the rest drop off
  # Authoritative Georgia Interstate route numbers — 7 primary + 8 auxiliary —
  # from en.wikipedia.org/wiki/List_of_Interstate_Highways_in_Georgia. A match on
  # any of these (e.g. "I-285", "I 75") is top-tier. I-420 is omitted: it was an
  # unbuilt designation, never constructed in Georgia.
  interstate_routes: [16, 20, 24, 59, 75, 85, 95, 185, 285, 475, 516, 520, 575, 675, 985]
  # Business routes ("I-75 BUS", "I-95 Business") are NOT full interstates — they
  # rank at the major-state-road tier (priority 3 in the hierarchy below).
  business_route_markers: ['BUS', 'BUSINESS']
  # Case-insensitive regexes that grade a major state road from its name/text.
  state_road_patterns:
    - '\bUS[- ]?\d+\b'          # US-78, US 19
    - '\bSR[- ]?\d+\b'          # SR-400
    - '\bGA[- ]?\d+\b'          # GA-400
    - '\bstate route\b'
    - '\bhwy\b'
    - '\bhighway\b'

# D5 ranking, highest first. AQI is handled as a separate callout, not ranked here.
ranking_order:
  - severe_weather
  - heat_index
  - winter_weather
  - thunderstorms
  - rain
  - wind
