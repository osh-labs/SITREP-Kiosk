# Field SITREP Board — Safety Tips (example / fallback content)
#
# This is the COMMITTED FALLBACK. Author the real, reviewed list at
# config/safety_tips.yaml (gitignored) and it takes precedence — the backend
# prefers safety_tips.yaml and only falls back to this file.
#
# Schema per tip:
#   id:        stable, unique, lowercase-hyphenated (e.g. heat-01)
#   category:  short descriptive group (heat, driving, ppe, site-hazard, …)
#   text:      the tip, one or two short sentences (<= 220 chars; hard cap 280)
#   tags:      optional list. Tags named in config.safety_tips.conditions gate the
#              tip on live weather (heat / cold / lightning). All other tags are
#              descriptive and never restrict when the tip shows.
#
# Gated examples below: heat-tagged tips appear only on hot days, cold-tagged
# only on cold days, lightning-tagged only when storms are in play.

tips:
  # ── Always-on (no gating tags) ────────────────────────────────────────────
  - id: general-01
    category: communication
    text: "Tell someone your route and expected return before you head out. A check-in plan is only useful if it exists before something goes wrong."
    tags: [communication]
  - id: general-02
    category: vehicle
    text: "Walk a full circle around the vehicle before backing up. Mirrors have blind spots; a 10-second lap doesn't."
    tags: [driving, vehicle]
  - id: general-03
    category: ppe
    text: "Hi-vis works on contrast, not color. At dusk and in rain, add lights — drivers see what stands out, not what's bright."
    tags: [ppe]
  - id: general-04
    category: situational-awareness
    text: "Stop and re-look when the job changes. Most incidents happen after conditions shift and the plan doesn't."
    tags: [situational-awareness]
  - id: general-05
    category: site-hazard
    text: "Treat every downed line as live. Stay back the length of a span and call it in — the ground around it can be energized."
    tags: [site-hazard, electrical]

  # ── Heat-gated (hot days only) ────────────────────────────────────────────
  - id: heat-01
    category: heat
    text: "Drink water before you're thirsty. Thirst means you're already behind — sip on a schedule, not on demand."
    tags: [heat]
  - id: heat-02
    category: heat
    text: "Build shade into the plan on hot days. Rotate heavy work to the cooler hours and take breaks out of the sun, not just off your feet."
    tags: [heat]
  - id: heat-03
    category: heat
    text: "Know the early signs of heat illness in yourself and your crew: headache, cramps, confusion. Cool down and hydrate before it escalates."
    tags: [heat]

  # ── Cold-gated (cold days only) ───────────────────────────────────────────
  - id: cold-01
    category: cold
    text: "Layer for cold work so you can shed as you warm up. Sweat that soaks in chills you fast once you stop moving."
    tags: [cold]
  - id: cold-02
    category: cold
    text: "Watch for black ice on shaded pavement, bridges, and metal surfaces — they freeze first and thaw last."
    tags: [cold, driving]

  # ── Lightning-gated (storms in play) ──────────────────────────────────────
  - id: lightning-01
    category: lightning
    text: "When thunder rolls, head indoors or into a hard-top vehicle. Wait 30 minutes after the last thunder before going back out."
    tags: [lightning]
  - id: lightning-02
    category: lightning
    text: "Clear elevated and exposed work early when storms are forecast. Don't wait for the first strike to decide to come down."
    tags: [lightning]
